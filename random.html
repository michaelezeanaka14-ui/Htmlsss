<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 --<title>Simple Navigation Bar</title>
<style>
    /* Reset default margins and paddings */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Navbar container */
    nav {
        background-color: #333;
        overflow: hidden;
    }

    /* Navbar links */
    nav a {
        float: left;
        display: block;
        color: white;
        text-align: center;
        padding: 14px 20px;
        text-decoration: none;
        font-size: 17px;
    }

    /* Hover effect */
    nav a:hover {
        background-color: #575757;
    }

    /* Active link */
    nav a.active {
        background-color: #04AA6D;
    }

    /* Responsive: stack links on small screens */
    @media screen and (max-width: 600px) {
        nav a {
            float: none;
            width: 100%;
            text-align: left;
        }
    }
</style>
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <a href="#home" class="active">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
</nav>

<!-- Page Content -->
<div style="padding:20px">
    <h1>Welcome</h1>
    <p>This is a simple HTML + CSS navigation bar example.</p>
</div>

</body>
</html>
