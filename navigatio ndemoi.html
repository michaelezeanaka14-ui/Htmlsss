<!DOCTYPE html>
<html>

<head>
  <title>Application Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Georgia">
</head>

<body>

<nav class="w3-bar w3-black">
  <a href="index.html" class="w3-bar-item w3-button w3-mobile">Home</a>
  <a href="Abouts us.html" class="w3-bar-item w3-button w3-mobile">About us</a>
  <a href="contacts2.html" class="w3-bar-item w3-button w3-mobile">Contacts</a>
  <a href="Application Form.html" class="w3-bar-item w3-button w3-mobile">Application Form</a>
</nav>

  <div class="w3-container w3-padding-32">

    <h2 class="w3-center">Application Form</h2>

    <form class="w3-container w3-card-4 w3-light-grey w3-padding">

      <p>
        <label>Full Name</label>
        <input class="w3-input w3-border w3-round-xxlarge"
               name="fullname"
               type="text">
      </p>

      <p>
        <label>Surname</label>
        <input class="w3-input w3-border w3-round-xxlarge"
               name="surname"
               type="text">
      </p>

      <p>
        <label>Email Address</label>
        <input class="w3-input w3-border w3-round-xxlarge"
               name="email"
               type="email">
      </p>

      <p>
        <label>Phone Number</label>
        <input class="w3-input w3-border w3-round-xxlarge"
               name="phone"
               type="tel">
      </p>

      <p>
        <label>Previous Experience</label>
        <textarea class="w3-input w3-border w3-round-large"
                  name="experience"></textarea>
      </p>

      <p>
        <button class="w3-button w3-black w3-round-large" type="submit">
          Submit Application
        </button>
      </p>

    </form>

  </div>

</body>
</html>
